global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - anti-ddos-recording-rules.yml

scrape_configs:
  - job_name: anti-ddos-control
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8080

  - job_name: anti-ddos-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9091
