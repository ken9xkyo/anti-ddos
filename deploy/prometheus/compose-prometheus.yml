global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/anti-ddos-recording-rules.yml

scrape_configs:
  - job_name: anti-ddos-control
    metrics_path: /metrics
    static_configs:
      - targets:
          - control-api:8080

  - job_name: anti-ddos-agent-host
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9091
